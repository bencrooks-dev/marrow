name: Wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_i686 *-win32 *-manylinux_i686"
          CIBW_ARCHS_MACOS: "auto64"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: "pytest {package}/tests -q"
          # cibuildwheel sets up isolated venvs; bring in build tools.
          CIBW_BEFORE_BUILD: "pip install pybind11 scikit-build-core cmake"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  collect:
    name: Collect dist
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-all
          path: dist/*

  publish_testpypi:
    name: Publish to TestPyPI
    needs: collect
    runs-on: ubuntu-latest
    # Only on release-candidate tags (e.g. v0.1.0rc1, v0.1.0a3).
    if: |
      github.event_name == 'push' &&
      contains(github.ref_name, 'rc') ||
      contains(github.ref_name, 'a') ||
      contains(github.ref_name, 'b')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agentcore
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-all
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish_pypi:
    name: Publish to PyPI
    needs: collect
    runs-on: ubuntu-latest
    # Only on full release tags (e.g. v0.1.0, v1.2.3) — no pre-release suffixes.
    if: |
      github.event_name == 'release' &&
      github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/agentcore
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-all
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
